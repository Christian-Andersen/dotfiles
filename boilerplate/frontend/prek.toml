orphan = true

[[repos]]
repo = "local"

[[repos.hooks]]
id = "biome-check"
name = "biome-check"
language = "system"
pass_filenames = false
entry = "npx biome check --write src/"

[[repos.hooks]]
id = "vue-tsc"
name = "vue-tsc"
language = "system"
pass_filenames = false
entry = "npm run type-check"

[[repos.hooks]]
id = "npm-audit"
name = "npm-audit"
language = "system"
pass_filenames = false
entry = "npm audit"
