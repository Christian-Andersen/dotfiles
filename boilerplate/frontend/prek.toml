orphan = true

[[repos]]
repo = "local"

[[repos.hooks]]
id = "biome-check"
name = "biome-check"
language = "system"
pass_filenames = false
entry = "npx --no-install biome check --write src/"

[[repos.hooks]]
id = "tsc"
name = "tsc"
language = "system"
pass_filenames = false
entry = "npx --no-install tsc --noEmit"
